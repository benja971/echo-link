<!doctype html>
<html lang="en" data-theme="mocha" data-accent="mauve">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <meta property="og:image" content="%sveltekit.assets%/og-default.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e1e2e" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <script>
      // Apply saved theme + accent + detected platform before first paint
      // to avoid FOUC and hydration mismatch on shortcut labels.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var a = localStorage.getItem('accent');
          if (t === 'latte' || t === 'frappe' || t === 'macchiato' || t === 'mocha') document.documentElement.dataset.theme = t;
          if (a) document.documentElement.dataset.accent = a;
          var ua = navigator.userAgent || '';
          document.documentElement.dataset.platform = /Mac|iPhone|iPad|iPod/.test(ua) ? 'mac' : 'pc';
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
