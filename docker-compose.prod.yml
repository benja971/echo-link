services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-link-web
    restart: always
    env_file:
      - .env.production
    ports:
      - '3002:3000'
    networks:
      - infra-net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: echo-link-bot
    restart: always
    env_file:
      - .env.production
    networks:
      - infra-net
    depends_on:
      web:
        condition: service_healthy

networks:
  infra-net:
    external: true

# Note: Postgres + MinIO must run elsewhere on the same `infra-net`.
# Required prod env vars (see .env.production.example):
# - DATABASE_HOST/PORT/USERNAME/PASSWORD/NAME/SSL/LOGGING
# - S3_ENDPOINT/PORT/USE_SSL/REGION/BUCKET_NAME/ACCESS_KEY/SECRET_KEY/FORCE_PATH_STYLE
# - PUBLIC_BASE_URL, CDN_PUBLIC_BASE_URL
# - EMAIL_HOST/PORT/SECURE/USER/PASSWORD/FROM
# - SESSION_SECRET (openssl rand -hex 32, ≥32 chars)
# - ANONYMOUS_IP_SALT (openssl rand -hex 16, ≥16 chars)
# - DISCORD_BOT_TOKEN, DISCORD_CLIENT_ID, DISCORD_GUILD_ID
# - ECHOLINK_BASE_URL, ECHOLINK_BOT_TOKEN
